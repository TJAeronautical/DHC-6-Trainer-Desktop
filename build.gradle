plugins {
    id "org.jetbrains.kotlin.jvm"
    id "org.jetbrains.compose" version "1.11.1"
    id "org.jetbrains.kotlin.plugin.compose"
}

kotlin {
    jvmToolchain(17)
}

dependencies {
    // Compose Desktop / Multiplatform dependencies.
    // Do not use Android-only AAR artifacts in this JVM desktop module.
    implementation(compose.desktop.currentOs)
    implementation(compose.material3)

    // jMonkeyEngine - real-time 3D GLB/GLTF model viewer (Systems Lab)
    // Rendering runs OFFSCREEN (hidden GLFW window via jme3-lwjgl3) and frames
    // are blitted into Compose. Do not switch to embedded AWT canvases:
    //  - jme3-lwjgl3 cannot create AWT canvases at all ("ctx is null"), and
    //  - jme3-lwjgl (LWJGL2) canvases need WGL Pbuffers, which fail on modern
    //    Intel drivers ("Could not create context (WGL_ARB_create_context)").
    def jme3 = "3.6.1-stable"
    implementation "org.jmonkeyengine:jme3-core:${jme3}"
    implementation "org.jmonkeyengine:jme3-desktop:${jme3}"
    implementation "org.jmonkeyengine:jme3-lwjgl3:${jme3}"
    implementation "org.jmonkeyengine:jme3-plugins:${jme3}"   // GLB/GLTF loader
    implementation "org.jmonkeyengine:jme3-effects:${jme3}"   // Bloom and anti-aliasing post-processing
}

def desktopGeneratedResources = layout.buildDirectory.dir("generated/desktopResources")
def coreAssetsCandidates = [
        file("../core-res/src/main/assets"),
        file("../DHC-6-Trainer/core-res/src/main/assets"),
        file("src/main/resources/assets")
]
def coreAssetsDir = coreAssetsCandidates.find { it.exists() } ?: coreAssetsCandidates.first()

tasks.register("generateDesktopProcedureIndex") {
    def outputFile = layout.buildDirectory.file("generated/desktopResources/desktop-procedure-index.txt")
    outputs.file(outputFile)

    doLast {
        def outFile = outputFile.get().asFile
        outFile.parentFile.mkdirs()

        def proceduresDir = new File(coreAssetsDir, "procedures")
        def lines = []
        if (proceduresDir.exists()) {
            proceduresDir.eachFileRecurse { f ->
                if (f.isFile() && f.name.endsWith(".json")) {
                    def relative = coreAssetsDir.toPath().relativize(f.toPath()).toString().replace(File.separatorChar, '/' as char)
                    lines << "assets/${relative}"
                }
            }
        }
        outFile.text = lines.sort().join("\n")
        if (!lines.isEmpty()) {
            outFile.append("\n")
        }
    }
}

