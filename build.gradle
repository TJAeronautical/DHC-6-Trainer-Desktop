tasks.register("generateDesktopCockpitIndex") {
    def outputFile = layout.buildDirectory.file("generated/desktopResources/cockpit-source-exact-index.txt")
    outputs.file(outputFile)

    doLast {
        def outFile = outputFile.get().asFile
        outFile.parentFile.mkdirs()

        def cockpitDir = new File(coreAssetsDir, "cockpit/source_exact")
        def lines = []
        if (cockpitDir.exists()) {
            cockpitDir.eachFileRecurse { f ->
                if (f.isFile()) {
                    def lower = f.name.toLowerCase()
                    if (lower.endsWith(".png") || lower.endsWith(".jpg") || lower.endsWith(".jpeg")) {
                        def relative = coreAssetsDir.toPath().relativize(f.toPath()).toString().replace(File.separatorChar, '/' as char)
                        lines << "assets/${relative}"
                    }
                }
            }
        }
        // Also include full cockpit panel images from cockpit/images/.
        def imagesDir = new File(coreAssetsDir, "cockpit/images")
        if (imagesDir.exists()) {
            imagesDir.eachFileRecurse { f ->
                if (f.isFile()) {
                    def lower = f.name.toLowerCase()
                    if (lower.endsWith(".png") || lower.endsWith(".webp") || lower.endsWith(".jpg")) {
                        def relative = coreAssetsDir.toPath().relativize(f.toPath()).toString().replace(File.separatorChar, '/' as char)
                        lines << "assets/${relative}"
                    }
                }
            }
        }
        outFile.text = lines.sort().join("\n")
        if (!lines.isEmpty()) {
            outFile.append("\n")
        }
    }
}

tasks.named("processResources") {
    // Generated indexes take precedence over any copy checked into
    // src/main/resources; Gradle 9 fails on duplicates without a strategy.
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
    dependsOn("generateDesktopProcedureIndex")
    dependsOn("generateDesktopFlashcardIndex")
    dependsOn("generateDesktopAssetIndex")
    dependsOn("generateDesktopCockpitIndex")

    if (coreAssetsDir.exists()) {
        from(coreAssetsDir) {
            into("assets")
        }
    }

    from(desktopGeneratedResources)
}

tasks.register("runRenderSmokeTest", JavaExec) {
    group = "verification"
    description = "Starts the offscreen 3D engine and verifies frames are not black."
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "com.dhc6trainer.desktop.RenderSmokeTestKt"
}

tasks.register("runAssetSmokeTest", JavaExec) {
    group = "verification"
    description = "Headless check that every 3D model/asset pipeline loads."
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "com.dhc6trainer.desktop.AssetSmokeTestKt"
    if (project.hasProperty("smokeOnly")) {
        systemProperty("smoke.only", project.property("smokeOnly"))
    }
}

compose.desktop {
    application {
        mainClass = "com.dhc6trainer.desktop.MainKt"

        nativeDistributions {
            targetFormats(
                    org.jetbrains.compose.desktop.application.dsl.TargetFormat.Msi,
                    org.jetbrains.compose.desktop.application.dsl.TargetFormat.Exe
            )

            packageName = "DHC6TrainerDesktop"
            packageVersion = "1.7.0"
            description = "DHC-6 Trainer Desktop - offline study, cockpit, systems, performance, and debrief trainer"
            vendor = "TJ Aeronautical"

            windows {
                iconFile.set(project.file("src/main/resources/icons/dhc6_trainer.ico"))
                menuGroup = "DHC-6 Trainer"
                shortcut = true
                dirChooser = true
            }
        }
    }
}
