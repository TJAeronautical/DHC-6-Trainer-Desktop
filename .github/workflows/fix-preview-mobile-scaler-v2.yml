name: Fix Preview Mobile Scaler V2
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/fix-preview-mobile-scaler-v2.yml]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/preview-mobile-scaler-v2
          fetch-depth: 0
      - name: Replace preview scaling geometry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          app = Path('preview/assets/app.js')
          text = app.read_text()
          pattern = re.compile(r'function fitStage\(\) \{.*?\n\}', re.S)
          replacement = '''function fitStage() {
            const stage = document.getElementById("stage");
            const wrap = document.getElementById("stageWrap");
            if (!stage || !wrap) return;

            const style = window.getComputedStyle(wrap);
            const padL = parseFloat(style.paddingLeft) || 0;
            const padR = parseFloat(style.paddingRight) || 0;
            const padT = parseFloat(style.paddingTop) || 0;
            const padB = parseFloat(style.paddingBottom) || 0;
            const available = Math.max(1, window.innerWidth - padL - padR);
            const scale = Math.min(1, available / 1440);
            const visibleWidth = 1440 * scale;
            const visibleHeight = 900 * scale;

            wrap.style.position = "relative";
            wrap.style.display = "block";
            wrap.style.width = "100%";
            wrap.style.height = `${visibleHeight + padT + padB}px`;
            stage.style.position = "absolute";
            stage.style.top = `${padT}px`;
            stage.style.left = scale < 1 ? `${padL}px` : `calc(50% - ${visibleWidth / 2}px)`;
            stage.style.margin = "0";
            stage.style.transformOrigin = "top left";
            stage.style.transform = `scale(${scale})`;
          }'''
          text, count = pattern.subn(replacement, text, count=1)
          assert count == 1, 'fitStage function not replaced'
          app.write_text(text)

          css = Path('preview/assets/styles.css')
          text = css.read_text()
          text = re.sub(
              r'\.stage-wrap \{.*?\n\}',
              '.stage-wrap {\n  width: 100%;\n  max-width: 100vw;\n  padding: var(--sp-lg);\n  position: relative;\n  display: block;\n  overflow: hidden;\n}',
              text,
              count=1,
              flags=re.S,
          )
          text = re.sub(
              r'@media \(max-width: 900px\) \{\n  \.stage-wrap \{ align-items: flex-start; justify-content: flex-start; \}\n  \.stage \{ transform-origin: top left; \}\n\}\n?',
              '',
              text,
              count=1,
          )
          css.write_text(text)

          html = Path('preview/index.html')
          text = html.read_text()
          text = text.replace('20260719-mobilefix1', '20260719-scalerv2')
          html.write_text(text)
          PY
      - name: Validate JavaScript
        run: node --check preview/assets/app.js
      - name: Validate deterministic mobile geometry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          app = Path('preview/assets/app.js').read_text()
          css = Path('preview/assets/styles.css').read_text()
          html = Path('preview/index.html').read_text()
          assert 'stage.style.position = "absolute"' in app
          assert 'const visibleWidth = 1440 * scale' in app
          assert 'stage.style.left = scale < 1' in app
          assert 'position: relative;' in css
          assert '20260719-scalerv2' in html
          print('mobile scaler v2 contract validated')
          PY
      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/fix-preview-mobile-scaler-v2.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add preview/assets/app.js preview/assets/styles.css preview/index.html .github/workflows/fix-preview-mobile-scaler-v2.yml
          git commit -m "Fix mobile preview with deterministic scaler"
          git push origin HEAD:agent/preview-mobile-scaler-v2
