name: Finish Step 5 Drill
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/finish-step5-drill.yml
      - src/main/kotlin/com/dhc6trainer/desktop/DedicatedDrillScreen.kt
      - preview/**
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step5-drill
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Wire Drill screen and preview
        shell: python
        run: |
          from pathlib import Path
          import re
          main=Path('src/main/kotlin/com/dhc6trainer/desktop/Main.kt')
          text=main.read_text()
          pattern=r'@Composable\s+private fun DrillScreen\(snapshot: FlashcardLibrarySnapshot\)\s*\{.*?\n\}\n\ninternal fun String\.cleanDisplay'
          replacement='@Composable\nprivate fun DrillScreen(snapshot: FlashcardLibrarySnapshot) {\n    DedicatedDrillScreen(snapshot)\n}\n\ninternal fun String.cleanDisplay'
          text,count=re.subn(pattern,replacement,text,count=1,flags=re.S)
          if count!=1: raise SystemExit(f'DrillScreen replacements: {count}')
          main.write_text(text)

          index=Path('preview/index.html'); text=index.read_text()
          if 'assets/drill.css' not in text:
              text=text.replace('<link rel="stylesheet" href="assets/qrh.css" />','<link rel="stylesheet" href="assets/qrh.css" />\n  <link rel="stylesheet" href="assets/drill.css" />',1)
          if 'assets/drill.js' not in text:
              text=text.replace('<script src="assets/qrh.js"></script>','<script src="assets/qrh.js"></script>\n  <script src="assets/drill.js"></script>',1)
          index.write_text(text)

          app=Path('preview/assets/app.js'); text=app.read_text()
          if 'activeId === "drill"' not in text:
              marker='  } else if (activeId === "qrh") {\n    renderQrh();\n  } else {'
              replacement='  } else if (activeId === "qrh") {\n    renderQrh();\n  } else if (activeId === "drill") {\n    renderDrill();\n  } else {'
              if marker not in text: raise SystemExit('Drill router marker not found')
              text=text.replace(marker,replacement,1)
          old='  document.querySelector(".chrome-step").textContent = activeId === "qrh"\n    ? "Step 2 · QRH (LIVE)"\n    : activeId === "dashboard"\n      ? "Step 1 · Foundation (LIVE)"\n      : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'
          new='  document.querySelector(".chrome-step").textContent = activeId === "drill"\n    ? "Step 5 · Drill (LIVE)"\n    : activeId === "qrh"\n      ? "Step 2 · QRH (LIVE)"\n      : activeId === "dashboard"\n        ? "Step 1 · Foundation (LIVE)"\n        : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'
          if old in text: text=text.replace(old,new,1)
          app.write_text(text)
      - name: Validate preview JavaScript
        run: node --check preview/assets/drill.js && node --check preview/assets/app.js
      - name: Compile desktop Kotlin
        run: gradle compileKotlin --no-daemon
      - name: Commit validated Step 5
        shell: bash
        run: |
          rm .github/workflows/finish-step5-drill.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Step 5: redesign Drill quiz screen"
          git push origin HEAD:agent/step5-drill
