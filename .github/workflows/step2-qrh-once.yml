name: Apply Step 2 QRH once

on:
  push:
    branches:
      - agent/step2-qrh
    paths:
      - .github/workflows/step2-qrh-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step2-qrh
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Apply QRH Kotlin and preview patch
        shell: bash
        run: |
          python - <<'PY'
