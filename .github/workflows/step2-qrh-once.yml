              "cmhUYWJ商以此类推...TRUNCATED_FOR_TOOL_CALL..." 
          )
          JS_DATA_B64 = ("...")
          JS_RENDER_B64 = ("...")
          CSS_QRH_B64 = ("...")

          def decode(value: str) -> str:
              return base64.b64decode(value).decode("utf-8")

          root = Path(".")
          kotlin_path = root / "src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt"
          kotlin_path.write_text(decode(KOTLIN_B64), encoding="utf-8")

          main_path = root / "src/main/kotlin/com/dhc6trainer/desktop/Main.kt"
          main = main_path.read_text(encoding="utf-8")
          old_qrh = """@Composable
          private fun QrhScreen(snapshot: ProcedureLibrarySnapshot) {
              ProceduresScreen(snapshot, initialTab = ChecklistTab.EMERGENCY)
          }"""
          new_qrh = """@Composable
          private fun QrhScreen(snapshot: ProcedureLibrarySnapshot) {
              DedicatedQrhScreen(snapshot)
          }"""
          if old_qrh not in main:
              raise SystemExit("Main.kt QRH fallback block was not found")
          main_path.write_text(main.replace(old_qrh, new_qrh, 1), encoding="utf-8")

          app_path = root / "preview/assets/app.js"
          app = app_path.read_text(encoding="utf-8")
          utilities_marker = "// ── Utilities ───────────────────────────────────────────────────────────────"
          placeholder_marker = "// ── Placeholder screens (Steps 2–9) ─────────────────────────────────────────"
          if "const QRH_CATEGORIES" not in app:
              if utilities_marker not in app:
                  raise SystemExit("app.js utilities marker was not found")
              app = app.replace(utilities_marker, decode(JS_DATA_B64) + utilities_marker, 1)
          if "function renderQrh()" not in app:
              if placeholder_marker not in app:
                  raise SystemExit("app.js placeholder marker was not found")
              app = app.replace(placeholder_marker, decode(JS_RENDER_B64) + placeholder_marker, 1)

          old_router = """  if (activeId === "dashboard") {
            renderDashboard();
          } else {
            const section = SECTIONS.find(s => s.id === activeId);
            const stub = STUB_COPY[activeId] || { step: "LATER", desc: "Preview coming soon." };
            renderStub(section, stub.step, stub.desc);
          }"""
          new_router = """  if (activeId === "dashboard") {
            renderDashboard();
          } else if (activeId === "qrh") {
            renderQrh();
          } else {
            const section = SECTIONS.find(s => s.id === activeId);
            const stub = STUB_COPY[activeId] || { step: "LATER", desc: "Preview coming soon." };
            renderStub(section, stub.step, stub.desc);
          }"""
          if old_router not in app:
              raise SystemExit("app.js router block was not found")
          app = app.replace(old_router, new_router, 1)

          old_step = """  document.querySelector(".chrome-step").textContent = activeId === "dashboard"
            ? "Step 1 · Foundation (LIVE)"
            : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;"""
          new_step = """  document.querySelector(".chrome-step").textContent = activeId === "qrh"
            ? "Step 2 · QRH (LIVE)"
            : activeId === "dashboard"
              ? "Step 1 · Foundation (LIVE)"
              : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;"""
          if old_step not in app:
              raise SystemExit("app.js chrome step block was not found")
          app_path.write_text(app.replace(old_step, new_step, 1), encoding="utf-8")

          styles_path = root / "preview/assets/styles.css"
          styles = styles_path.read_text(encoding="utf-8")
          css_marker = """/* ============================================================================
             Placeholder for screens shipping in later steps
             ========================================================================== */"""
          if ".qrh-screen {" not in styles:
              if css_marker not in styles:
                  raise SystemExit("styles.css placeholder marker was not found")
              styles = styles.replace(css_marker, decode(CSS_QRH_B64) + css_marker, 1)
          styles_path.write_text(styles, encoding="utf-8")

          index_path = root / "preview/index.html"
          index = index_path.read_text(encoding="utf-8")
          old_index_step = '<span class="chrome-step" data-step="1">Step 1 · Foundation</span>'
          new_index_step = '<span class="chrome-step" data-step="2">Step 2 · QRH</span>'
          if old_index_step not in index:
              raise SystemExit("preview step label was not found")
          index_path.write_text(index.replace(old_index_step, new_index_step, 1), encoding="utf-8")
          PY

      - name: Validate JavaScript
        run: node --check preview/assets/app.js

      - name: Compile Kotlin
        run: |
          chmod +x gradlew
          ./gradlew compileKotlin --no-daemon

      - name: Commit validated Step 2
        shell: bash
        run: |
          rm .github/workflows/step2-qrh-once.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Step 2: dedicated QRH categories and procedure detail"
          git push origin HEAD:agent/step2-qrh
