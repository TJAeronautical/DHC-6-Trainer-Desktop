name: Repair Step 10 Card Arguments
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step10-logbook
          fetch-depth: 0
      - name: Replace positional Card calls
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/main/kotlin/com/dhc6trainer/desktop/DedicatedLogbookScreen.kt')
          t=p.read_text()
          t=t.replace('Card(modifier, RoundedCornerShape(16.dp), CardDefaults.cardColors(containerColor = Dhc6DesktopColors.SurfaceDark), BorderStroke(1.dp, Dhc6DesktopColors.BorderSoft)) {', '''Card(
        modifier = modifier,
        shape = RoundedCornerShape(16.dp),
        colors = CardDefaults.cardColors(containerColor = Dhc6DesktopColors.SurfaceDark),
        border = BorderStroke(1.dp, Dhc6DesktopColors.BorderSoft),
    ) {''')
          t=t.replace('Card(modifier.fillMaxWidth(), RoundedCornerShape(22.dp), CardDefaults.cardColors(containerColor = Dhc6DesktopColors.SurfaceDark), BorderStroke(1.dp, Dhc6DesktopColors.Border)) {', '''Card(
        modifier = modifier.fillMaxWidth(),
        shape = RoundedCornerShape(22.dp),
        colors = CardDefaults.cardColors(containerColor = Dhc6DesktopColors.SurfaceDark),
        border = BorderStroke(1.dp, Dhc6DesktopColors.Border),
    ) {''')
          t=t.replace('Card(modifier, RoundedCornerShape(12.dp), CardDefaults.cardColors(containerColor = Dhc6DesktopColors.Background)) {', '''Card(
        modifier = modifier,
        shape = RoundedCornerShape(12.dp),
        colors = CardDefaults.cardColors(containerColor = Dhc6DesktopColors.Background),
    ) {''')
          p.write_text(t)
          PY
      - name: Commit repair
        run: |
          rm .github/workflows/fix-step10-card-args.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix Step 10 Material3 Card arguments"
          git push origin agent/step10-logbook
