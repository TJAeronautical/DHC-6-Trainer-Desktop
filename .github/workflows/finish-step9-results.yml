name: Finish Step 9 Session Results
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/finish-step9-results.yml]
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step9-session-results
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution