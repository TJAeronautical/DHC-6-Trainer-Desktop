name: Polish QRH Dotted Leaders
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/polish-qrh-leaders.yml]
permissions:
  contents: write
jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/polish-qrh-leaders
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution