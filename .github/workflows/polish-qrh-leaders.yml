# Validation workflow for the isolated QRH leader polish.
name: Polish QRH Dotted Leaders
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/polish-qrh-leaders.yml]
permissions:
  contents: write
jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/polish-qrh-leaders
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Apply QRH leader layout fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt')
          text = path.read_text()
          old = '''@Composable
          private fun QrhStep(step: ProcedureStep, accent: Color) {
              Row(Modifier.fillMaxWidth().padding(vertical = 10.dp), verticalAlignment = Alignment.CenterVertically) {
                  Text("${step.number ?: "-"}", color = Dhc6DesktopColors.TextMuted, fontWeight = FontWeight.Bold, modifier = Modifier.width(28.dp))
                  Text(step.action, color = Color.White, fontWeight = FontWeight.SemiBold, fontSize = 14.sp, lineHeight = 20.sp, modifier = Modifier.weight(1f))
                  val reference = step.reference
                  if (!reference.isNullOrBlank()) {
                      Text("......", color = Dhc6DesktopColors.BorderSoft, modifier = Modifier.padding(horizontal = 8.dp))
                      Text(reference.uppercase(), color = accent, fontWeight = FontWeight.Black, fontSize = 13.sp, textAlign = TextAlign.End, modifier = Modifier.widthIn(min = 70.dp))
                  }
              }
          }
'''
          new = '''@Composable
          private fun QrhStep(step: ProcedureStep, accent: Color) {
              Row(
                  modifier = Modifier.fillMaxWidth().padding(vertical = 10.dp),
                  verticalAlignment = Alignment.CenterVertically,
              ) {
                  Text(
                      text = "${step.number ?: "-"}",
                      color = Dhc6DesktopColors.TextMuted,
                      fontWeight = FontWeight.Bold,
                      modifier = Modifier.width(28.dp),
                  )
                  Text(
                      text = step.action,
                      color = Color.White,
                      fontWeight = FontWeight.SemiBold,
                      fontSize = 14.sp,
                      lineHeight = 20.sp,
                      modifier = Modifier.weight(2f),
                  )
                  val reference = step.reference
                  if (!reference.isNullOrBlank()) {
                      Text(
                          text = "·".repeat(200),
                          color = Dhc6DesktopColors.TextMuted,
                          maxLines = 1,
                          overflow = TextOverflow.Clip,
                          modifier = Modifier
                              .weight(1f)
                              .padding(horizontal = 8.dp),
                      )
                      Text(
                          text = reference.uppercase(),
                          color = accent,
                          fontWeight = FontWeight.Black,
                          fontSize = 13.sp,
                          lineHeight = 17.sp,
                          textAlign = TextAlign.End,
                          modifier = Modifier.widthIn(min = 70.dp, max = 200.dp),
                      )
                  }
              }
          }
'''
          if old not in text:
              raise SystemExit('QrhStep marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Validate layout contract
        run: |
          grep -F '"·".repeat(200)' src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt
          grep -F 'Modifier.weight(2f)' src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt
          grep -F 'Modifier.widthIn(min = 70.dp, max = 200.dp)' src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt
      - name: Compile desktop Kotlin
        run: gradle compileKotlin --no-daemon
      - name: Commit validated polish
        run: |
          rm .github/workflows/polish-qrh-leaders.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Polish QRH dotted leader layout"
          git push origin agent/polish-qrh-leaders
