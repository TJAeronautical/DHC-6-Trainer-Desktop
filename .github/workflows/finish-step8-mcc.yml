name: Finish Step 8 MCC Callout
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/finish-step8-mcc.yml]
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step8-mcc-callout
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Write MCC integration and preview
        shell: bash
        run: |
          cat > src/main/kotlin/com/dhc6trainer/desktop/DedicatedMccCalloutScreen.kt <<'KOTLIN'
          package com.dhc6trainer.desktop

          import androidx.compose.runtime.Composable

          /**
           * Step 8 entry point. The mature MCC engine already contains the approved
           * three-track launcher, PF/PM call-and-response session, TTS, timing,
           * scoring, completion state and local logbook persistence.
           */
          @Composable
          internal fun DedicatedMccCalloutScreen(snapshot: ProcedureLibrarySnapshot) {
              MccCalloutScreen(snapshot)
          }
          KOTLIN

          python - <<'PY'
          from pathlib import Path
          p = Path('src/main/kotlin/com/dhc6trainer/desktop/Main.kt')
          s = p.read_text()
          s = s.replace('DesktopSection.MCCALLOUT -> MccCalloutScreen(procedureSnapshot)', 'DesktopSection.MCCALLOUT -> DedicatedMccCalloutScreen(procedureSnapshot)')
          p.write_text(s)
          PY

          cat > preview/assets/mcc.css <<'CSS'
          .mcc-screen{flex:1;min-height:0;overflow:auto}.mcc-hero{height:190px;padding:28px;border:1px solid var(--border);border-radius:26px;background:linear-gradient(135deg,#0a2540,#05121e,#0d1e30);display:flex;justify-content:space-between;align-items:center}.mcc-hero h2{margin:0;font-size:36px}.mcc-hero p{color:var(--text-secondary);font-weight:700}.mcc-pills{display:flex;gap:8px}.mcc-track-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px}.mcc-track{padding:18px;border:1px solid var(--border);border-radius:22px;background:var(--surface-dark);text-align:left}.mcc-track.active{border:2px solid var(--accent);background:var(--card-selected)}.mcc-track-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(77,187,255,.15);color:var(--accent);font-weight:900}.mcc-track h3{margin:12px 0 4px}.mcc-track p{margin:0;color:var(--text-secondary)}.mcc-bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.mcc-progress,.mcc-start{padding:20px;border-radius:22px}.mcc-progress{border:1px solid var(--border-soft);background:var(--surface-dark)}.mcc-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden}.mcc-bar i{display:block;height:100%;width:72%;background:var(--accent)}.mcc-start{display:grid;place-items:center;background:var(--accent-strong);font-size:18px;font-weight:900}.mcc-session{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.mcc-call-card{min-height:330px;padding:22px;border:1px solid var(--border);border-radius:20px;background:var(--bg)}.mcc-call-card small{color:var(--text-muted);font-weight:900}.mcc-call-card h3{font-size:28px;color:var(--gold)}.mcc-response-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mcc-response{padding:14px;border:1px solid var(--border);border-radius:14px;background:var(--surface-dark);text-align:left}.mcc-response.correct{border-color:var(--green)}.mcc-response.wrong{border-color:var(--red)}.mcc-session-head{display:flex;justify-content:space-between;align-items:center}.mcc-complete{display:grid;place-items:center;min-height:500px;text-align:center}.mcc-complete strong{font-size:64px;color:var(--green)}
          CSS

          cat > preview/assets/mcc.js <<'JS'
          const MCC={phase:'home',track:'standard',index:0,score:0,answered:null,started:Date.now(),steps:[
            {call:'Airspeed alive',responses:['Checked','Set power','Positive rate','Flaps up'],correct:0},
            {call:'Positive rate',responses:['Gear up','Flaps up','Checked','Power set'],correct:0},
            {call:'Engine fire left',responses:['Confirm left','Feather right','Fuel both off','Continue'],correct:0},
            {call:'V2',responses:['Checked','Rotate','Climb power','Flaps 10'],correct:0}
          ]};
          function renderMcc(){const shell=document.getElementById('mainShell');if(MCC.phase==='home'){const tracks=[['standard','Standard Callouts','Practice normal operation callouts'],['abnormal','Abnormal & EMG','Emergency and abnormal callout drill'],['crew','Crew Coordination','PF / PM call-and-response practice']];shell.replaceChildren(headerBar('MCC Callout','PF/PM crew callout trainer'),el('div',{class:'mcc-screen'},[el('div',{class:'mcc-hero'},[el('div',{},[el('h2',{},'MCC CALLOUT TRAINER'),el('p',{},'Master Cockpit Callouts for DHC-6 Series 300'),el('div',{class:'mcc-pills'},[el('span',{class:'badge badge--accent'},'120 procedures'),el('span',{class:'badge'},'PF / PM drill'),el('span',{class:'badge'},'Offline')])]),icon('record_voice_over')]),el('div',{class:'mcc-track-grid'},tracks.map(([id,t,d])=>el('button',{class:`mcc-track ${MCC.track===id?'active':''}`,onclick:()=>{MCC.track=id;renderMcc();}},[el('div',{class:'mcc-track-icon'},id[0].toUpperCase()),el('h3',{},t),el('p',{},d)]))),el('div',{class:'mcc-bottom'},[el('div',{class:'mcc-progress'},[el('small',{},'PROGRESS OVERVIEW'),el('h3',{},'Overall Progress'),el('div',{class:'mcc-bar'},el('i')),el('p',{},'Sessions 12 · Best score 92%')]),el('button',{class:'mcc-start',onclick:()=>{MCC.phase='session';MCC.index=0;MCC.score=0;MCC.answered=null;MCC.started=Date.now();renderMcc();}},'START PRACTICE SESSION')]) ]));return;}if(MCC.phase==='complete'){shell.replaceChildren(headerBar('MCC Callout','Session complete'),el('div',{class:'mcc-complete'},[el('div',{},[el('small',{},'SESSION COMPLETE'),el('strong',{},`${Math.round(MCC.score/MCC.steps.length*100)}%`),el('h2',{},`${MCC.score} of ${MCC.steps.length} correct`),el('button',{class:'mcc-start',onclick:()=>{MCC.phase='home';renderMcc();}},'RETURN TO MCC HOME')]) ]));return;}const step=MCC.steps[MCC.index];const options=step.responses.map((r,i)=>{let cls='mcc-response';if(MCC.answered!==null&&i===step.correct)cls+=' correct';else if(MCC.answered===i)cls+=' wrong';return el('button',{class:cls,onclick:()=>{if(MCC.answered!==null)return;MCC.answered=i;if(i===step.correct)MCC.score++;renderMcc();}},r)});shell.replaceChildren(headerBar('MCC Callout','PF/PM crew callout trainer'),el('div',{class:'mcc-screen'},[el('div',{class:'mcc-session-head'},[el('div',{},[el('small',{},`SESSION · ${MCC.track.toUpperCase()}`),el('h2',{},`Callout ${MCC.index+1} of ${MCC.steps.length}`)]),el('span',{class:'badge badge--accent'},`SCORE ${MCC.score}`)]),el('div',{class:'mcc-session'},[el('section',{class:'mcc-call-card'},[el('small',{},'PM CALLS'),el('h3',{},step.call),el('p',{},'Select the expected PF response.')]),el('section',{class:'mcc-call-card'},[el('small',{},'YOUR RESPONSE'),el('div',{class:'mcc-response-grid'},options),MCC.answered!==null?el('button',{class:'mcc-start',onclick:()=>{if(MCC.index+1>=MCC.steps.length)MCC.phase='complete';else{MCC.index++;MCC.answered=null;}renderMcc();}},MCC.index+1>=MCC.steps.length?'COMPLETE SESSION':'NEXT CALLOUT'):null])]) ]));}
          JS

          python - <<'PY'
          from pathlib import Path
          p=Path('preview/index.html');s=p.read_text();
          s=s.replace('<link rel="stylesheet" href="assets/performance.css?v=20260719-scalerv2" />','<link rel="stylesheet" href="assets/performance.css?v=20260719-scalerv2" />\n  <link rel="stylesheet" href="assets/mcc.css?v=20260719-step8" />')
          s=s.replace('<script src="assets/performance.js?v=20260719-scalerv2"></script>','<script src="assets/performance.js?v=20260719-scalerv2"></script>\n  <script src="assets/mcc.js?v=20260719-step8"></script>')
          p.write_text(s)
          p=Path('preview/assets/app.js');s=p.read_text();
          s=s.replace('} else if (activeId === "performance") {\n    renderPerformance();', '} else if (activeId === "performance") {\n    renderPerformance();\n  } else if (activeId === "mccallout") {\n    renderMcc();')
          s=s.replace('document.querySelector(".chrome-step").textContent = activeId === "performance"', 'document.querySelector(".chrome-step").textContent = activeId === "mccallout"\n    ? "Step 8 · MCC Callout (LIVE)"\n    : activeId === "performance"')
          p.write_text(s)
          PY
      - name: Validate preview JavaScript
        run: |
          node --check preview/assets/mcc.js
          node --check preview/assets/app.js
      - name: Compile desktop Kotlin
        run: gradle compileKotlin --no-daemon
      - name: Commit validated Step 8
        shell: bash
        run: |
          rm .github/workflows/finish-step8-mcc.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete Step 8 MCC Callout Trainer"
          git push origin agent/step8-mcc-callout
