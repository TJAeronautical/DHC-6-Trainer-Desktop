name: Validate QRH Polish
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  validate:
    if: github.head_ref == 'agent/polish-qrh-leaders'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/polish-qrh-leaders
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Patch QRH leader layout
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt')
          t = p.read_text()
          t = t.replace('modifier = Modifier.weight(1f))\n        val reference', 'modifier = Modifier.weight(2f))\n        val reference', 1)
          t = t.replace('Text("......", color = Dhc6DesktopColors.BorderSoft, modifier = Modifier.padding(horizontal = 8.dp))', 'Text("·".repeat(200), color = Dhc6DesktopColors.TextMuted, maxLines = 1, overflow = TextOverflow.Clip, modifier = Modifier.weight(1f).padding(horizontal = 8.dp))', 1)
          t = t.replace('modifier = Modifier.widthIn(min = 70.dp))', 'modifier = Modifier.widthIn(min = 70.dp, max = 200.dp))', 1)
          if '"·".repeat(200)' not in t or 'Modifier.weight(2f)' not in t or 'max = 200.dp' not in t:
              raise SystemExit('QRH leader patch did not apply')
          p.write_text(t)
          PY
      - name: Compile Kotlin
        run: gradle compileKotlin --no-daemon
      - name: Commit validated patch
        run: |
          rm -f .github/workflows/polish-qrh-leaders.yml .github/workflows/run-qrh-polish.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Polish QRH dotted leader layout"
          git push origin agent/polish-qrh-leaders
