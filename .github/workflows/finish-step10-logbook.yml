name: Finish Step 10 Logbook
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/finish-step10-logbook.yml]
permissions:
  contents: write
jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step10-logbook
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Wire logbook and preview
        run: |
          python - <<'PY'
          from pathlib import Path
          main = Path('src/main/kotlin/com/dhc6trainer/desktop/Main.kt')
          text = main.read_text()
          old = 'DesktopSection.LOGBOOK -> LogbookScreen(onNavigate)'
          new = 'DesktopSection.LOGBOOK -> DedicatedLogbookScreen(onStartMcc = { onNavigate(DesktopSection.MCCALLOUT) }, onStartDrill = { onNavigate(DesktopSection.DRILL) })'
          if old not in text:
              raise SystemExit('Logbook route marker not found')
          main.write_text(text.replace(old, new, 1))

          css = '''.logbook-preview{display:flex;flex-direction:column;gap:14px;flex:1;min-height:0}.logbook-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.logbook-stat,.logbook-list,.logbook-detail,.logbook-focus{border:1px solid var(--border);border-radius:18px;background:var(--surface-dark);padding:16px}.logbook-stat small,.logbook-eyebrow{color:var(--text-muted);font-size:11px;font-weight:900}.logbook-stat strong{display:block;font-size:26px;margin-top:4px}.logbook-toolbar{display:flex;justify-content:space-between;align-items:center}.logbook-filters{display:flex;gap:8px}.logbook-filters button,.logbook-clear{border:1px solid var(--border);border-radius:999px;background:var(--surface-dark);padding:8px 14px;font-weight:900}.logbook-filters button.active{border-color:var(--accent);color:var(--accent)}.logbook-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;flex:1;min-height:0}.logbook-list{overflow:auto}.logbook-attempt{width:100%;display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;border:1px solid var(--border);border-radius:14px;background:var(--bg);padding:14px;margin-top:8px;text-align:left}.logbook-attempt.active{border:2px solid var(--accent)}.logbook-tag{color:var(--accent);font-weight:900}.logbook-attempt strong,.logbook-attempt small{display:block}.logbook-score{font-size:18px;font-weight:900}.logbook-side{display:flex;flex-direction:column;gap:14px;min-height:0}.logbook-detail{flex:1}.logbook-detail h2{font-size:26px}.logbook-facts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.logbook-fact{background:var(--bg);border-radius:12px;padding:12px;text-align:center}.logbook-focus-row{display:flex;justify-content:space-between;margin-top:8px}'''
          Path('preview/assets/logbook.css').write_text(css)

          js = '''const LOGBOOK_PREVIEW={filter:'ALL',selected:0,attempts:[{type:'MCC',title:'Before Takeoff Callouts',score:92,correct:11,total:12,time:'03:42',date:'19 Jul · 16:14'},{type:'DRILL',title:'PT6A Limitations',score:75,correct:9,total:12,time:'04:18',date:'18 Jul · 21:06'},{type:'MCC',title:'Engine Fire Sequence',score:67,correct:4,total:6,time:'02:10',date:'18 Jul · 08:32'},{type:'DRILL',title:'Electrical System',score:83,correct:10,total:12,time:'03:56',date:'17 Jul · 19:44'}]};function renderLogbook(){const shell=document.getElementById('mainShell');const shown=LOGBOOK_PREVIEW.attempts.filter(a=>LOGBOOK_PREVIEW.filter==='ALL'||a.type===LOGBOOK_PREVIEW.filter);if(LOGBOOK_PREVIEW.selected>=shown.length)LOGBOOK_PREVIEW.selected=0;const current=shown[LOGBOOK_PREVIEW.selected]||shown[0];const stat=(l,v)=>el('div',{class:'logbook-stat'},[el('small',{},l),el('strong',{},v)]);const filters=['ALL','MCC','DRILL'].map(f=>el('button',{class:LOGBOOK_PREVIEW.filter===f?'active':'',onclick:()=>{LOGBOOK_PREVIEW.filter=f;LOGBOOK_PREVIEW.selected=0;renderLogbook();}},f));const rows=shown.map((a,i)=>el('button',{class:`logbook-attempt ${i===LOGBOOK_PREVIEW.selected?'active':''}`,onclick:()=>{LOGBOOK_PREVIEW.selected=i;renderLogbook();}},[el('span',{class:'logbook-tag'},a.type),el('span',{},[el('strong',{},a.title),el('small',{},a.date)]),el('span',{class:'logbook-score'},`${a.score}%`)]));const detail=current?el('div',{class:'logbook-detail'},[el('span',{class:'logbook-eyebrow'},'RECORDED ATTEMPT'),el('h2',{},current.title),el('p',{},`${current.type} · ${current.date}`),el('div',{class:'logbook-facts'},[['SCORE',`${current.correct}/${current.total}`],['RESULT',`${current.score}%`],['TIME',current.time]].map(([l,v])=>el('div',{class:'logbook-fact'},[el('small',{},l),el('strong',{},v)]))),el('p',{},current.score>=90?'Strong result. Maintain proficiency with periodic repetition.':'Review missed or prompted items against approved training material before repeating this session.')]):el('div',{class:'logbook-detail'},'No attempts in this filter.');shell.replaceChildren(headerBar('Debrief Logbook','Local attempt history and debrief notes'),el('div',{class:'logbook-preview'},[el('div',{class:'logbook-stats'},[stat('SESSIONS','4'),stat('AVERAGE','79%'),stat('MCC BEST','92%'),stat('DRILL BEST','83%')]),el('div',{class:'logbook-toolbar'},[el('div',{class:'logbook-filters'},filters),el('button',{class:'logbook-clear'},'CLEAR HISTORY')]),el('div',{class:'logbook-grid'},[el('div',{class:'logbook-list'},[el('span',{class:'logbook-eyebrow'},'ATTEMPT HISTORY'),...rows]),el('div',{class:'logbook-side'},[detail,el('div',{class:'logbook-focus'},[el('span',{class:'logbook-eyebrow'},'FOCUS AREAS'),...[['Engine Fire Sequence','67% · 1'],['PT6A Limitations','75% · 1']].map(([t,v])=>el('div',{class:'logbook-focus-row'},[el('span',{},t),el('strong',{},v)]))])])]) ]));}'''
          Path('preview/assets/logbook.js').write_text(js)

          index = Path('preview/index.html')
          html = index.read_text()
          html = html.replace('<link rel="stylesheet" href="assets/results.css?v=20260719-step9" />', '<link rel="stylesheet" href="assets/results.css?v=20260719-step9" />\n  <link rel="stylesheet" href="assets/logbook.css?v=20260719-step10" />')
          html = html.replace('<script src="assets/mcc.js?v=20260719-step8"></script>', '<script src="assets/mcc.js?v=20260719-step8"></script>\n  <script src="assets/logbook.js?v=20260719-step10"></script>')
          index.write_text(html)

          app = Path('preview/assets/app.js')
          text = app.read_text()
          text = text.replace("  } else {\n    const section = SECTIONS.find(s => s.id === activeId);", "  } else if (activeId === 'logbook') {\n    renderLogbook();\n  } else {\n    const section = SECTIONS.find(s => s.id === activeId);")
          text = text.replace(": activeId === \"dashboard\"\n        ? \"Step 1 · Foundation (LIVE)\"", ": activeId === \"logbook\"\n        ? \"Step 10 · Debrief Logbook (LIVE)\"\n        : activeId === \"dashboard\"\n        ? \"Step 1 · Foundation (LIVE)\"")
          app.write_text(text)
          PY
      - name: Validate preview JavaScript
        run: |
          node --check preview/assets/logbook.js
          node --check preview/assets/app.js
      - name: Compile desktop Kotlin
        run: gradle compileKotlin --no-daemon
      - name: Commit validated Step 10
        run: |
          rm .github/workflows/finish-step10-logbook.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Step 10: redesign debrief logbook"
          git push origin agent/step10-logbook
