name: Finish Step 2 QRH

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/finish-step2-qrh.yml

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step2-qrh
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Apply fixes and wire QRH
        shell: python
        run: |
          from pathlib import Path
          import re

          main = Path("src/main/kotlin/com/dhc6trainer/desktop/Main.kt")
          text = main.read_text(encoding="utf-8")
          replacements = {
              'subtitle = "Quick Reference\nHandbook",': 'subtitle = "Quick Reference\\nHandbook",',
              'subtitle = "Practice\nQuestions",': 'subtitle = "Practice\\nQuestions",',
              'subtitle = "Normal & Emergency\nChecklists",': 'subtitle = "Normal & Emergency\\nChecklists",',
              'subtitle = "Takeoff, Landing &\nClimb Data",': 'subtitle = "Takeoff, Landing &\\nClimb Data",',
              'subtitle = "Master Cockpit Callouts\nfor DHC-6 Series 300",': 'subtitle = "Master Cockpit Callouts\\nfor DHC-6 Series 300",',
              'subtitle = "Study decks by\nsystem and topic",': 'subtitle = "Study decks by\\nsystem and topic",',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Missing dashboard string: {old!r}")
              text = text.replace(old, new, 1)

          pattern = r'(@Composable\s+private fun QrhScreen\(snapshot: ProcedureLibrarySnapshot\)\s*\{)\s*ProceduresScreen\(snapshot, initialTab = ChecklistTab\.EMERGENCY\)\s*(\})'
          text, count = re.subn(pattern, r'\1\n    DedicatedQrhScreen(snapshot)\n\2', text, count=1)
          if count != 1:
              raise SystemExit(f"QRH fallback replacements: {count}")
          main.write_text(text, encoding="utf-8")

          qrh = Path("src/main/kotlin/com/dhc6trainer/desktop/DedicatedQrhScreen.kt")
          text = qrh.read_text(encoding="utf-8")
          text = text.replace(
              'contentPadding = PaddingValues(vertical = 8.dp, bottom = 24.dp)',
              'contentPadding = PaddingValues(start = 0.dp, top = 8.dp, end = 0.dp, bottom = 24.dp)',
              1,
          )
          qrh.write_text(text, encoding="utf-8")

          index = Path("preview/index.html")
          text = index.read_text(encoding="utf-8")
          if 'assets/qrh.css' not in text:
              text = text.replace('<link rel="stylesheet" href="assets/styles.css" />', '<link rel="stylesheet" href="assets/styles.css" />\n  <link rel="stylesheet" href="assets/qrh.css" />', 1)
          if 'assets/qrh.js' not in text:
              text = text.replace('<script src="assets/app.js"></script>', '<script src="assets/qrh.js"></script>\n  <script src="assets/app.js"></script>', 1)
          text = text.replace('data-step="1">Step 1 · Foundation', 'data-step="2">Step 2 · QRH', 1)
          index.write_text(text, encoding="utf-8")

          app = Path("preview/assets/app.js")
          text = app.read_text(encoding="utf-8")
          if 'activeId === "qrh"' not in text:
              marker = '  } else {\n    const section = SECTIONS.find(s => s.id === activeId);'
              replacement = '  } else if (activeId === "qrh") {\n    renderQrh();\n  } else {\n    const section = SECTIONS.find(s => s.id === activeId);'
              if marker not in text:
                  raise SystemExit("Preview router marker not found")
              text = text.replace(marker, replacement, 1)
          old = '  document.querySelector(".chrome-step").textContent = activeId === "dashboard"\n    ? "Step 1 · Foundation (LIVE)"\n    : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'
          new = '  document.querySelector(".chrome-step").textContent = activeId === "qrh"\n    ? "Step 2 · QRH (LIVE)"\n    : activeId === "dashboard"\n      ? "Step 1 · Foundation (LIVE)"\n      : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'
          if old in text:
              text = text.replace(old, new, 1)
          app.write_text(text, encoding="utf-8")

      - name: Validate preview JavaScript
        run: node --check preview/assets/qrh.js && node --check preview/assets/app.js

      - name: Compile desktop Kotlin
        run: gradle compileKotlin --no-daemon

      - name: Commit validated Step 2
        shell: bash
        run: |
          rm .github/workflows/finish-step2-qrh.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Step 2: wire dedicated QRH and live preview"
          git push origin HEAD:agent/step2-qrh
