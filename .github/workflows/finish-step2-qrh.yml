name: Finish Step 2 QRH

on:
  push:
    branches: [agent/step2-qrh]
    paths: [.github/workflows/finish-step2-qrh.yml]

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step2-qrh
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Wire dedicated QRH
        shell: python
        run: |
          from pathlib import Path

          main = Path("src/main/kotlin/com/dhc6trainer/desktop/Main.kt")
          text = main.read_text()
          old = """@Composable
          private fun QrhScreen(snapshot: ProcedureLibrarySnapshot) {
              ProceduresScreen(snapshot, initialTab = ChecklistTab.EMERGENCY)
          }"""
          new = """@Composable
          private fun QrhScreen(snapshot: ProcedureLibrarySnapshot) {
              DedicatedQrhScreen(snapshot)
          }"""
          if old not in text:
              raise SystemExit("QRH fallback not found")
          main.write_text(text.replace(old, new, 1))

          index = Path("preview/index.html")
          text = index.read_text()
          text = text.replace('<link rel="stylesheet" href="assets/styles.css" />', '<link rel="stylesheet" href="assets/styles.css" />\n  <link rel="stylesheet" href="assets/qrh.css" />', 1)
          text = text.replace('<script src="assets/app.js"></script>', '<script src="assets/qrh.js"></script>\n  <script src="assets/app.js"></script>', 1)
          text = text.replace('data-step="1">Step 1 · Foundation', 'data-step="2">Step 2 · QRH', 1)
          index.write_text(text)

          app = Path("preview/assets/app.js")
          text = app.read_text()
          old_router = '''  if (activeId === "dashboard") {
            renderDashboard();
          } else {
            const section = SECTIONS.find(s => s.id === activeId);
            const stub = STUB_COPY[activeId] || { step: "LATER", desc: "Preview coming soon." };
            renderStub(section, stub.step, stub.desc);
          }'''
          new_router = '''  if (activeId === "dashboard") {
            renderDashboard();
          } else if (activeId === "qrh") {
            renderQrh();
          } else {
            const section = SECTIONS.find(s => s.id === activeId);
            const stub = STUB_COPY[activeId] || { step: "LATER", desc: "Preview coming soon." };
            renderStub(section, stub.step, stub.desc);
          }'''
          if old_router not in text:
              raise SystemExit("Preview router not found")
          text = text.replace(old_router, new_router, 1)
          old_step = '''  document.querySelector(".chrome-step").textContent = activeId === "dashboard"
            ? "Step 1 · Foundation (LIVE)"
            : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'''
          new_step = '''  document.querySelector(".chrome-step").textContent = activeId === "qrh"
            ? "Step 2 · QRH (LIVE)"
            : activeId === "dashboard"
              ? "Step 1 · Foundation (LIVE)"
              : `Preview: ${SECTIONS.find(s => s.id === activeId).title}`;'''
          if old_step not in text:
              raise SystemExit("Preview step label not found")
          app.write_text(text.replace(old_step, new_step, 1))
      - name: Validate preview JavaScript
        run: node --check preview/assets/qrh.js && node --check preview/assets/app.js
      - name: Compile desktop Kotlin
        run: chmod +x gradlew && ./gradlew compileKotlin --no-daemon
      - name: Commit validated wiring
        shell: bash
        run: |
          rm .github/workflows/finish-step2-qrh.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Step 2: wire dedicated QRH and live preview"
          git push origin HEAD:agent/step2-qrh
