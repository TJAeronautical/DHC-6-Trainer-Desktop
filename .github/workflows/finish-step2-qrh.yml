name: Finish Step 2 QRH
on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/finish-step2-qrh.yml]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and validate
        shell: bash
        run: |
          git clone -q --depth 1 --branch agent/step2-qrh https://github.com/TJAeronautical/DHC-6-Trainer-Desktop.git repo
          cd repo
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('src/main/kotlin/com/dhc6trainer/desktop/Main.kt'); t=p.read_text()
          t,n=re.subn(r'(@Composable\s+private fun QrhScreen\(snapshot: ProcedureLibrarySnapshot\)\s*\{)\s*ProceduresScreen\(snapshot, initialTab = ChecklistTab\.EMERGENCY\)\s*(\})',r'\1\n    DedicatedQrhScreen(snapshot)\n\2',t,count=1)
          assert n==1; p.write_text(t)
          p=Path('preview/index.html'); t=p.read_text().replace('<link rel="stylesheet" href="assets/styles.css" />','<link rel="stylesheet" href="assets/styles.css" />\n  <link rel="stylesheet" href="assets/qrh.css" />',1).replace('<script src="assets/app.js"></script>','<script src="assets/qrh.js"></script>\n  <script src="assets/app.js"></script>',1); p.write_text(t)
          p=Path('preview/assets/app.js'); t=p.read_text(); t=t.replace('  } else {\n    const section = SECTIONS.find(s => s.id === activeId);','  } else if (activeId === "qrh") {\n    renderQrh();\n  } else {\n    const section = SECTIONS.find(s => s.id === activeId);',1); p.write_text(t)
          PY
          node --check preview/assets/qrh.js
          node --check preview/assets/app.js
          chmod +x gradlew
          set +e
          ./gradlew compileKotlin --no-daemon > build.log 2>&1
          status=$?
          grep -E "(^e: |error:|Compilation error|What went wrong|FAILED)" build.log || tail -n 40 build.log
          exit $status
